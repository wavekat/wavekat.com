name: Preview Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run cf:build

      - name: Deploy preview
        id: deploy
        run: npx wrangler pages deploy ./dist --project-name=wavekat-com --branch="${{ github.head_ref || github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build preview URL
        if: github.event_name == 'pull_request'
        id: preview-url
        run: echo "url=https://$(echo '${{ github.head_ref }}' | tr '/' '-').wavekat-com.pages.dev" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            🔗 Preview: ${{ steps.preview-url.outputs.url }}
